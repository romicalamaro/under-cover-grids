<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6-fold Grid — 70×180cm @ 300 DPI</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell app-shell--standalone">
      <aside class="sidebar" aria-label="Design controls">
        <div class="sidebar__scroll">
          <section class="sidebar__section sidebar__section--identity">
            <h2 class="sidebar__title">Profile</h2>
            <div class="sidebar__identity-fields">
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Have I lived in Iran?</span>
                <div class="sidebar__identity-slot" id="identity-living-slot">
                  <div
                    class="sidebar__toggle sidebar__identity-living-toggle"
                    role="group"
                    aria-label="Have I lived in Iran? Yes or no"
                  >
                    <button
                      type="button"
                      id="living-in-btn"
                      class="sidebar__toggle-btn is-active"
                      aria-pressed="true"
                    >
                      Yes
                    </button>
                    <button
                      type="button"
                      id="living-outside-btn"
                      class="sidebar__toggle-btn"
                      aria-pressed="false"
                    >
                      No
                    </button>
                  </div>
                </div>
              </div>
              <div
                class="sidebar__identity-field"
                id="identity-leaving-year-field"
              >
                <span class="sidebar__identity-heading">Year of leaving</span>
                <div class="sidebar__identity-slot" id="identity-leaving-year-slot">
                  <input
                    id="identity-leaving-year-input"
                    class="sidebar__identity-input"
                    type="text"
                    value="2021"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="4"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Year of leaving"
                    placeholder="Year you left Iran"
                  />
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">From</span>
                <div class="sidebar__identity-slot" id="identity-from-slot">
                  <input
                    id="identity-from-input"
                    class="sidebar__identity-input sidebar__identity-input--english"
                    type="text"
                    lang="en"
                    value="TEHERAN"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="From"
                    placeholder="Where you are originally from"
                  />
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Now in</span>
                <div class="sidebar__identity-slot" id="identity-now-in-slot">
                  <input
                    id="identity-now-in-input"
                    class="sidebar__identity-input sidebar__identity-input--english"
                    type="text"
                    lang="en"
                    value="MAINZ"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Now in"
                    placeholder="Where you live now"
                  />
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Name</span>
                <div class="sidebar__identity-slot" id="identity-name-slot">
                  <input
                    id="identity-name-input"
                    class="sidebar__identity-input sidebar__identity-input--english"
                    type="text"
                    lang="en"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Name"
                    placeholder="Full name"
                  />
                  <div
                    class="sidebar__toggle sidebar__identity-name-mode-toggle"
                    role="group"
                    aria-label="How name appears on the label"
                  >
                    <button
                      type="button"
                      id="identity-name-anonymous-btn"
                      class="sidebar__toggle-btn is-active"
                      aria-pressed="true"
                    >
                      Anonymous
                    </button>
                    <button
                      type="button"
                      id="identity-name-initials-btn"
                      class="sidebar__toggle-btn"
                      aria-pressed="false"
                    >
                      Initials
                    </button>
                    <button
                      type="button"
                      id="identity-name-none-btn"
                      class="sidebar__toggle-btn"
                      aria-pressed="false"
                    >
                      No name
                    </button>
                  </div>
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Age</span>
                <div class="sidebar__identity-slot" id="identity-age-slot">
                  <input
                    id="identity-age-input"
                    class="sidebar__identity-input"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="2"
                    autocomplete="off"
                    aria-label="Age"
                  />
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Family or friends in Iran</span>
                <div class="sidebar__identity-slot" id="family-friends-iran-slot">
                  <div
                    class="sidebar__toggle sidebar__identity-living-toggle"
                    role="group"
                    aria-label="Family or friends in Iran? Yes or no"
                  >
                    <button
                      type="button"
                      id="family-friends-iran-yes-btn"
                      class="sidebar__toggle-btn is-active"
                      aria-pressed="true"
                    >
                      Yes
                    </button>
                    <button
                      type="button"
                      id="family-friends-iran-no-btn"
                      class="sidebar__toggle-btn"
                      aria-pressed="false"
                    >
                      No
                    </button>
                  </div>
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Regime</span>
                <div class="sidebar__identity-slot" id="identity-regime-slot">
                  <div
                    class="sidebar__identity-regime"
                    id="identity-regime-control"
                  >
                    <div class="sidebar__identity-regime-slider-wrap">
                      <div
                        class="sidebar__identity-regime-segments"
                        aria-hidden="true"
                      >
                        <span
                          class="sidebar__identity-regime-segment is-active"
                          data-segment="1"
                        ></span>
                        <span
                          class="sidebar__identity-regime-segment"
                          data-segment="2"
                        ></span>
                        <span
                          class="sidebar__identity-regime-segment"
                          data-segment="3"
                        ></span>
                      </div>
                      <input
                        id="identity-regime-slider"
                        class="sidebar__identity-regime-slider"
                        type="range"
                        min="1"
                        max="3"
                        value="1"
                        step="1"
                        aria-valuemin="1"
                        aria-valuemax="3"
                        aria-valuenow="1"
                        aria-valuetext="Personal"
                      />
                    </div>
                    <div
                      class="sidebar__identity-regime-labels"
                      role="group"
                      aria-label="Regime"
                    >
                      <button
                        type="button"
                        class="sidebar__identity-regime-label is-active"
                        data-regime="1"
                      >
                        Personal
                      </button>
                      <button
                        type="button"
                        class="sidebar__identity-regime-label"
                        data-regime="2"
                      >
                        Family Members
                      </button>
                      <button
                        type="button"
                        class="sidebar__identity-regime-label"
                        data-regime="3"
                      >
                        Friends
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Lost</span>
                <div class="sidebar__identity-slot" id="identity-lost-slot">
                  <div
                    class="sidebar__identity-regime"
                    id="identity-lost-control"
                  >
                    <div class="sidebar__identity-regime-slider-wrap">
                      <div
                        class="sidebar__identity-regime-segments"
                        aria-hidden="true"
                      >
                        <span
                          class="sidebar__identity-regime-segment is-active"
                          data-segment="1"
                        ></span>
                        <span
                          class="sidebar__identity-regime-segment"
                          data-segment="2"
                        ></span>
                        <span
                          class="sidebar__identity-regime-segment"
                          data-segment="3"
                        ></span>
                      </div>
                      <input
                        id="identity-lost-slider"
                        class="sidebar__identity-regime-slider"
                        type="range"
                        min="1"
                        max="3"
                        value="1"
                        step="1"
                        aria-valuemin="1"
                        aria-valuemax="3"
                        aria-valuenow="1"
                        aria-valuetext="Inner Circle"
                      />
                    </div>
                    <div
                      class="sidebar__identity-regime-labels"
                      role="group"
                      aria-label="Lost"
                    >
                      <button
                        type="button"
                        class="sidebar__identity-regime-label is-active"
                        data-lost="1"
                      >
                        Inner Circle
                      </button>
                      <button
                        type="button"
                        class="sidebar__identity-regime-label"
                        data-lost="2"
                        aria-label="Middle"
                      ></button>
                      <button
                        type="button"
                        class="sidebar__identity-regime-label"
                        data-lost="3"
                      >
                        Distant Circle
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="sidebar__section sidebar__section--grid-choose">
            <h2 class="sidebar__title">Grid</h2>
            <div
              class="sidebar__grid-choose-btns"
              role="group"
              aria-label="Grid type"
            >
              <a href="index.html" id="grid-choose-octagon-btn" class="sidebar__grid-btn"
                >Octagon</a
              >
              <a
                href="six-fold.html"
                id="grid-choose-sixfold-btn"
                class="sidebar__grid-btn is-active"
                aria-current="page"
                >6-fold</a
              >
              <a
                href="nested-star-octagons.html"
                id="grid-choose-star-btn"
                class="sidebar__grid-btn"
                >Star grid</a
              >
            </div>
          </section>

          <section class="sidebar__section sidebar__section--colors-export">
            <h2 class="sidebar__title">Grid &amp; export</h2>
            <ol
              class="sidebar__numbered sidebar__controls--compact"
              aria-label="Grid and export"
            >
            <li class="sidebar__item">
              <span class="sidebar__item-label">Unit size</span>
              <div class="sidebar__item-control">
                <input
                  id="six-fold-unit-size"
                  type="range"
                  min="40"
                  max="280"
                  value="100"
                  step="1"
                />
                <output id="six-fold-unit-size-out" for="six-fold-unit-size"
                  >100 px</output
                >
              </div>
            </li>
            <li class="sidebar__item sidebar__item--action">
              <span class="sidebar__item-label">Export SVG</span>
              <div class="sidebar__item-control">
                <button type="button" id="export-svg-btn">Export SVG</button>
              </div>
            </li>
          </ol>
          </section>

          <p class="sidebar__hint" id="tile-info" aria-live="polite"></p>
        </div>
      </aside>
      <div class="main">
        <div class="stage-wrap" id="stage-wrap">
          <!-- SVG injected by js/sixFoldApp.js -->
        </div>
      </div>
    </div>
    <script defer src="js/constants.js"></script>
    <script defer src="js/sixFoldGeometry.js"></script>
    <script defer src="js/identityControls.js"></script>
    <script defer src="js/sixFoldApp.js"></script>
  </body>
</html>
