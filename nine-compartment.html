<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9-Compartment Orthogonal Grid — 70×180cm @ 300 DPI</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell app-shell--swastika">
      <aside class="sidebar" aria-label="Design controls">
        <div class="sidebar__scroll">
          <section class="sidebar__section sidebar__section--grid-choose">
            <h2 class="sidebar__title">Grid</h2>
            <p class="sidebar__hint">
              9-compartment unit: 80% center square, 10% side bands (4:1 when tiled).
            </p>
          </section>

          <section class="sidebar__section sidebar__section--colors-export">
            <h2 class="sidebar__title">Grid &amp; export</h2>
            <ol
              class="sidebar__numbered sidebar__controls--square"
              aria-label="Grid and export"
            >
            <li class="sidebar__item">
              <span class="sidebar__item-label">Unit size</span>
              <div class="sidebar__item-control">
                <input
                  id="unit-size"
                  type="range"
                  min="40"
                  max="280"
                  value="100"
                  step="1"
                />
                <output id="unit-size-out" for="unit-size">100 px</output>
              </div>
            </li>
            <li class="sidebar__item sidebar__item--action">
              <span class="sidebar__item-label">Export SVG</span>
              <div class="sidebar__item-control">
                <button type="button" id="export-svg-btn">Export SVG</button>
              </div>
            </li>
          </ol>
          </section>

          <p class="sidebar__hint" id="tile-info" aria-live="polite"></p>
        </div>
      </aside>
      <div class="main">
        <div class="stage-wrap" id="stage-wrap"></div>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        /** Logical print canvas: 70cm × 180cm at 300 DPI */
        var CANVAS_W = 827;
        var CANVAS_H = 2126;
        var VIEW_MARGIN = 24;

        var UNIT_MIN = 40;
        var UNIT_MAX = 280;
        var UNIT_DEFAULT = 100;

        /**
         * Center square ≈ 80% of unit; each side band/corner ≈ 10%.
         * Tiled gutters = 10% + 10% = 20% between large squares (~4:1 ratio).
         */
        var CENTER_FRAC = 0.8;
        var SIDE_FRAC = 0.1;

        var BG_COLOR = "#ffffff";
        var STROKE_COLOR = "#222222";
        var STROKE_WIDTH = 1;

        var NS = "http://www.w3.org/2000/svg";
        var designSvg = null;
        var cachedSegments = [];

        function elSvg(name) {
          return document.createElementNS(NS, name);
        }

        function roundCoord(v) {
          return Math.round(v * 10000) / 10000;
        }

        function segmentKey(x1, y1, x2, y2) {
          var ax = roundCoord(x1);
          var ay = roundCoord(y1);
          var bx = roundCoord(x2);
          var by = roundCoord(y2);
          if (ax > bx || (ax === bx && ay > by)) {
            return bx + "," + by + "," + ax + "," + ay;
          }
          return ax + "," + ay + "," + bx + "," + by;
        }

        function addSegment(map, x1, y1, x2, y2) {
          if (x1 === x2 && y1 === y2) return;
          var key = segmentKey(x1, y1, x2, y2);
          if (!map.has(key)) {
            map.set(key, {
              x1: roundCoord(x1),
              y1: roundCoord(y1),
              x2: roundCoord(x2),
              y2: roundCoord(y2),
            });
          }
        }

        /**
         * One repeat unit: large central square (80%×80%) with its four sides extended
         * to the unit edges → 2 vertical + 2 horizontal lines, 9 compartments.
         * Symmetry axes (H, V, both diagonals) are construction-only — not drawn.
         */
        function addRepeatUnit(map, ox, oy, u) {
          var x1 = roundCoord(ox + SIDE_FRAC * u);
          var x2 = roundCoord(ox + (SIDE_FRAC + CENTER_FRAC) * u);
          var y1 = roundCoord(oy + SIDE_FRAC * u);
          var y2 = roundCoord(oy + (SIDE_FRAC + CENTER_FRAC) * u);
          var xEnd = roundCoord(ox + u);
          var yEnd = roundCoord(oy + u);

          addSegment(map, x1, oy, x1, yEnd);
          addSegment(map, x2, oy, x2, yEnd);
          addSegment(map, ox, y1, xEnd, y1);
          addSegment(map, ox, y2, xEnd, y2);
        }

        function buildAllSegments(unitSize, canvasW, canvasH) {
          var u = unitSize;
          if (!(u > 0)) return [];

          var map = new Map();
          var colStart = Math.floor(-canvasW / u) - 1;
          var colEnd = Math.ceil(canvasW / u) + 1;
          var rowStart = Math.floor(-canvasH / u) - 1;
          var rowEnd = Math.ceil(canvasH / u) + 1;
          var col;
          var row;

          for (row = rowStart; row <= rowEnd; row++) {
            for (col = colStart; col <= colEnd; col++) {
              addRepeatUnit(map, col * u, row * u, u);
            }
          }

          return Array.from(map.values());
        }

        function getUnitSize() {
          var slider = document.getElementById("unit-size");
          var v = slider ? Number(slider.value) : UNIT_DEFAULT;
          return Math.min(UNIT_MAX, Math.max(UNIT_MIN, Math.round(v)));
        }

        function segmentsToGroup(segments) {
          var g = elSvg("g");
          g.setAttribute("fill", "none");
          g.setAttribute("stroke", STROKE_COLOR);
          g.setAttribute("stroke-width", String(STROKE_WIDTH));
          g.setAttribute("stroke-linecap", "square");
          g.setAttribute("stroke-linejoin", "miter");

          for (var i = 0; i < segments.length; i++) {
            var s = segments[i];
            var line = elSvg("line");
            line.setAttribute("x1", String(s.x1));
            line.setAttribute("y1", String(s.y1));
            line.setAttribute("x2", String(s.x2));
            line.setAttribute("y2", String(s.y2));
            g.appendChild(line);
          }
          return g;
        }

        function createDesignSvg() {
          var svg = elSvg("svg");
          designSvg = svg;
          svg.setAttribute("id", "design-svg");
          svg.setAttribute("viewBox", "0 0 " + CANVAS_W + " " + CANVAS_H);
          svg.setAttribute("xmlns", NS);
          svg.setAttribute("role", "img");
          svg.setAttribute(
            "aria-label",
            "Nine-compartment orthogonal grid pattern"
          );

          var defs = elSvg("defs");
          var clip = elSvg("clipPath");
          clip.setAttribute("id", "canvas-clip");
          var clipRect = elSvg("rect");
          clipRect.setAttribute("x", "0");
          clipRect.setAttribute("y", "0");
          clipRect.setAttribute("width", String(CANVAS_W));
          clipRect.setAttribute("height", String(CANVAS_H));
          clip.appendChild(clipRect);
          defs.appendChild(clip);
          svg.appendChild(defs);

          var bg = elSvg("rect");
          bg.setAttribute("x", "0");
          bg.setAttribute("y", "0");
          bg.setAttribute("width", String(CANVAS_W));
          bg.setAttribute("height", String(CANVAS_H));
          bg.setAttribute("fill", BG_COLOR);
          svg.appendChild(bg);

          var pattern = elSvg("g");
          pattern.setAttribute("id", "layer-pattern");
          pattern.setAttribute("clip-path", "url(#canvas-clip)");
          svg.appendChild(pattern);

          return svg;
        }

        function layoutStage() {
          var wrap = document.getElementById("stage-wrap");
          var svg = document.getElementById("design-svg");
          if (!wrap || !svg) return;
          var rect = wrap.getBoundingClientRect();
          var availW = Math.max(60, rect.width - VIEW_MARGIN * 2);
          var availH = Math.max(60, rect.height - VIEW_MARGIN * 2);
          var scale = Math.min(availW / CANVAS_W, availH / CANVAS_H);
          svg.style.width = CANVAS_W * scale + "px";
          svg.style.height = CANVAS_H * scale + "px";
        }

        function render() {
          var unitSize = getUnitSize();
          var out = document.getElementById("unit-size-out");
          if (out) out.textContent = String(unitSize) + " px";

          var info = document.getElementById("tile-info");
          if (info) {
            var cols = Math.ceil(CANVAS_W / unitSize);
            var rows = Math.ceil(CANVAS_H / unitSize);
            info.textContent =
              "Unit " +
              unitSize +
              " px · ~" +
              cols +
              " × " +
              rows +
              " across canvas";
          }

          cachedSegments = buildAllSegments(unitSize, CANVAS_W, CANVAS_H);

          if (!designSvg) {
            designSvg = createDesignSvg();
            var wrap = document.getElementById("stage-wrap");
            if (wrap) wrap.appendChild(designSvg);
          }

          var patternLayer = designSvg.querySelector("#layer-pattern");
          if (!patternLayer) return;

          while (patternLayer.firstChild) {
            patternLayer.removeChild(patternLayer.firstChild);
          }
          patternLayer.appendChild(segmentsToGroup(cachedSegments));
          layoutStage();
        }

        function buildExportSvgString() {
          var segments = cachedSegments.length
            ? cachedSegments
            : buildAllSegments(getUnitSize(), CANVAS_W, CANVAS_H);
          var lines = [];

          lines.push('<?xml version="1.0" encoding="UTF-8"?>');
          lines.push(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' +
              CANVAS_W +
              " " +
              CANVAS_H +
              '" width="' +
              CANVAS_W +
              '" height="' +
              CANVAS_H +
              '">'
          );
          lines.push("<defs>");
          lines.push(
            '<clipPath id="canvas-clip"><rect x="0" y="0" width="' +
              CANVAS_W +
              '" height="' +
              CANVAS_H +
              '"/></clipPath>'
          );
          lines.push("</defs>");
          lines.push(
            '<rect x="0" y="0" width="' +
              CANVAS_W +
              '" height="' +
              CANVAS_H +
              '" fill="' +
              BG_COLOR +
              '"/>'
          );
          lines.push('<g clip-path="url(#canvas-clip)">');
          lines.push(
            '<g fill="none" stroke="' +
              STROKE_COLOR +
              '" stroke-width="' +
              STROKE_WIDTH +
              '" stroke-linecap="square" stroke-linejoin="miter">'
          );

          for (var i = 0; i < segments.length; i++) {
            var s = segments[i];
            lines.push(
              '<line x1="' +
                s.x1 +
                '" y1="' +
                s.y1 +
                '" x2="' +
                s.x2 +
                '" y2="' +
                s.y2 +
                '"/>'
            );
          }

          lines.push("</g>");
          lines.push("</g>");
          lines.push("</svg>");
          return lines.join("\n");
        }

        function downloadBlob(blob, filename) {
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        }

        function onExportSvg() {
          var btn = document.getElementById("export-svg-btn");
          if (btn) btn.disabled = true;
          try {
            var markup = buildExportSvgString();
            var blob = new Blob([markup], {
              type: "image/svg+xml;charset=utf-8",
            });
            downloadBlob(blob, "nine-compartment-export-70x180cm.svg");
          } catch (e) {
            console.error(e);
            alert("SVG export failed.");
          } finally {
            if (btn) btn.disabled = false;
          }
        }

        function init() {
          var slider = document.getElementById("unit-size");
          if (slider) {
            slider.min = String(UNIT_MIN);
            slider.max = String(UNIT_MAX);
            slider.value = String(UNIT_DEFAULT);
            slider.addEventListener("input", render);
          }

          var exportBtn = document.getElementById("export-svg-btn");
          if (exportBtn) exportBtn.addEventListener("click", onExportSvg);

          window.addEventListener("resize", layoutStage);
          render();
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
